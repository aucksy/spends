# Project-wide Gradle settings.

# JVM arguments for the Gradle daemon. Room/KSP + Hilt annotation processing wants a little more
# heap than a UI-only module; 4 GB is comfortable on a CI runner.
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8

# Build features
org.gradle.parallel=true
org.gradle.caching=true
# Configuration cache is intentionally OFF: KSP + Hilt + Room together still have rough edges with
# it on some AGP 8.7 setups, and this project only builds in CI where we favour a guaranteed-green
# build over the cache speedup.
org.gradle.configuration-cache=false

# AndroidX
android.useAndroidX=true
android.nonTransitiveRClass=true

# Kotlin
kotlin.code.style=official

# Room incremental annotation processing
room.incremental=true
