name: Android Release

# Builds Spends and publishes a GitHub RELEASE with the APK attached, when you push a tag like
# `v1.0.0`.
#
# Signing: add these repository secrets (Settings → Secrets and variables → Actions) for a SIGNED
# release (applicationId com.spends.app):
#   KEYSTORE_BASE64    base64 of your release keystore (key alias must be `spends`)
#   KEYSTORE_PASSWORD  keystore password (also used as the key password)
#
# IMPORTANT: KEYSTORE_BASE64 must be CLEAN base64 with no headers/line-wrapping. On Windows:
#   [Convert]::ToBase64String([IO.File]::ReadAllBytes("C:\path\to\release.keystore")) | Set-Clipboard
#
# If the keystore is missing or invalid, the job does NOT fail — it builds an installable debug APK
# instead and still publishes the Release (clearly labelled), so you always get something.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_PLAY: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper exists
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.10.2
          fi
          chmod +x gradlew

      - name: Decode & verify keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::No KEYSTORE_BASE64 secret — building an installable debug APK instead."
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf '%s' "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > "$RUNNER_TEMP/release.keystore" 2>/dev/null || true
          bytes=$(wc -c < "$RUNNER_TEMP/release.keystore" 2>/dev/null | tr -d ' ' || echo 0)
          echo "Decoded keystore size: ${bytes:-0} bytes."
          if [ "${bytes:-0}" -lt 100 ]; then
            echo "::warning::KEYSTORE_BASE64 did NOT decode to a real keystore (${bytes:-0} bytes). Re-encode cleanly."
            echo "signed=false" >> "$GITHUB_OUTPUT"
          elif keytool -list -keystore "$RUNNER_TEMP/release.keystore" -storepass "$KEYSTORE_PASSWORD" >/dev/null 2>&1; then
            echo "Keystore decoded (${bytes} bytes) and opened OK — building a SIGNED release."
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Keystore decoded (${bytes} bytes) but could NOT be opened — KEYSTORE_PASSWORD is wrong. Debug fallback."
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Build
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          if [ "${{ steps.keystore.outputs.signed }}" = "true" ]; then
            ./gradlew assembleRelease bundleRelease --no-daemon --stacktrace
          else
            ./gradlew assembleDebug --no-daemon --stacktrace
          fi

      - name: Collect outputs
        run: |
          NAME="Spends-${{ github.ref_name }}"
          mkdir -p dist
          for f in app/build/outputs/apk/release/*.apk;    do [ -f "$f" ] && cp "$f" "dist/${NAME}.apk"; done
          for f in app/build/outputs/bundle/release/*.aab; do [ -f "$f" ] && cp "$f" "dist/${NAME}.aab"; done
          for f in app/build/outputs/apk/debug/*.apk;      do [ -f "$f" ] && cp "$f" "dist/${NAME}-debug.apk"; done
          echo "Artifacts to publish:"; ls -la dist

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIGNED: ${{ steps.keystore.outputs.signed }}
        run: |
          TAG="${{ github.ref_name }}"
          if [ "$SIGNED" = "true" ]; then
            NOTES="Signed release build of **Spends** (\`com.spends.app\`). Download the \`.apk\` below and install it on your phone (allow installs from unknown sources). The \`.aab\` is for Google Play upload."
          else
            NOTES="⚠️ Installable **debug** build (\`com.spends.app.debug\`) — published because \`KEYSTORE_BASE64\` was missing or invalid. It installs and runs fine. For a proper signed release, fix the keystore secret (see the workflow header) and re-push the tag."
          fi
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" --title "Spends $TAG" --notes "$NOTES" dist/*

      - name: Upload artifacts (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: spends-release
          path: dist/*
          if-no-files-found: error

      # --- Google Play (internal track) ---
      # Runs only on a signed tag build AND when the PLAY_SERVICE_ACCOUNT_JSON secret exists.
      - name: Publish to Google Play (internal testing)
        if: ${{ startsWith(github.ref, 'refs/tags/') && env.HAS_PLAY == 'true' && steps.keystore.outputs.signed == 'true' }}
        continue-on-error: true
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.spends.app
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed
          whatsNewDirectory: distribution/whatsnew
