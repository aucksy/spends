name: CI

# Runs on every pull request and on pushes to main: unit tests + Android Lint. Keeps `main` green.
# (Instrumentation tests on a cloud device matrix + detekt/ktlint land with the QA phase.)

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper exists
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.10.2
          fi
          chmod +x gradlew

      - name: Unit tests
        run: |
          set -o pipefail
          ./gradlew testDebugUnitTest --no-daemon --stacktrace 2>&1 | tee gradle-test-output.txt

      - name: Android Lint (informational)
        run: ./gradlew lintDebug --no-daemon --stacktrace

      # Full Gradle console output as an artifact: compile errors never reach the HTML test
      # reports, and this machine polls CI anonymously (no gh CLI / no API token for job logs).
      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: gradle-test-output.txt
          if-no-files-found: ignore

      - name: Upload test + lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            app/build/reports/tests/
            app/build/reports/lint-results-*.html
          if-no-files-found: ignore
