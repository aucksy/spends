name: Android Debug APK

# Builds an installable DEBUG APK in the cloud — no signing secrets required.
# Runs on every push to main and can also be started manually from the Actions tab.

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper exists
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.10.2
          fi
          chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p dist
          for f in app/build/outputs/apk/debug/*.apk; do [ -f "$f" ] && cp "$f" "dist/Spends-debug.apk"; done

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Spends-debug-apk
          path: dist/Spends-debug.apk
          if-no-files-found: error
